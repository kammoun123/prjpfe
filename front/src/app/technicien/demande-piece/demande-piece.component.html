<div class="admin-container animate-fade-in">
    <!-- ═══ CLEAN HEADER ═══ -->
    <header class="hero-header">
        <div class="hero-content">
            <div class="hero-badge">
                <i class="bi bi-shield-check"></i> Espace Technicien
            </div>
            <h1>Nouvelle Requête de Pièce</h1>
            <p>Remplissez le formulaire ci-dessous pour soumettre votre demande d'intervention</p>
        </div>
        <div class="hero-date">
            <i class="bi bi-calendar3"></i>
            {{ today | date:'EEEE d MMMM yyyy' }}
        </div>
    </header>

    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="glass-premium animate-slide-up">
                <div class="form-body-pro">
                    <form [formGroup]="demandeForm" (ngSubmit)="onSubmit()">
                        
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label-pro">Catégorie de Pièce</label>
                                <select class="form-select-pro" formControlName="categorie" (change)="onCategorieChange()">
                                    <option [ngValue]="null">Toutes les catégories</option>
                                    <option *ngFor="let cat of categories" [ngValue]="cat.idCategorie">
                                        {{ cat.nomCategorie }}
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label-pro">Sélection du Produit</label>
                                <div class="input-group-pro">
                                    <i class="bi bi-search input-icon-pro"></i>
                                    <select class="form-select-pro" formControlName="piece"
                                        [class.is-invalid]="f['piece'].touched && f['piece'].invalid">
                                        <option [ngValue]="null" disabled selected>
                                            {{ pieces.length === 0 ? 'Aucune pièce disponible' : 'Choisir une pièce...' }}
                                        </option>
                                        <option *ngFor="let piece of pieces" [ngValue]="piece">
                                            {{ piece.designation }} (Ref: {{ piece.reference }})
                                        </option>
                                    </select>
                                </div>
                                <div *ngIf="f['piece'].value?.ficheTechniqueUrl" class="mt-2 animate-fade-in">
                                    <a [href]="backendUrl + f['piece'].value.ficheTechniqueUrl" target="_blank" class="text-primary small fw-bold text-decoration-none d-flex align-items-center gap-2">
                                        <i class="bi bi-file-earmark-pdf-fill"></i>
                                        Fiche technique disponible
                                    </a>
                                </div>
                            </div>
                        </div>

                        <div class="row g-4 mt-1 align-items-end">
                            <div class="col-md-4">
                                <label class="form-label-pro">Quantité Requise</label>
                                <div class="input-group-pro">
                                    <input type="number" class="form-input-pro" formControlName="quantite" placeholder="Ex: 5">
                                </div>
                            </div>
                            <div class="col-md-8">
                                <button type="button" (click)="ajouterAuPanier()" class="btn-primary-pro w-100 bg-primary-soft border-0" style="height: 52px; background: rgba(59, 130, 246, 0.1); color: #3b82f6;">
                                    <i class="bi bi-cart-plus me-2"></i> Ajouter au panier de demande
                                </button>
                            </div>
                        </div>

                        <!-- ═══ BASKET SECTION ═══ -->
                        <div class="basket-section mt-5 animate-slide-up" *ngIf="panier.length > 0">
                            <div class="section-divider"></div>
                            <label class="form-label-pro mb-3">Articles dans la demande actuelle ({{ panier.length }})</label>
                            
                            <div class="table-responsive">
                                <table class="table-basket">
                                    <thead>
                                        <tr>
                                            <th>Désignation de la pièce</th>
                                            <th style="width: 100px; text-align: center;">Qté</th>
                                            <th style="width: 80px; text-align: right;">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr *ngFor="let item of panier; let i = index">
                                            <td class="fw-bold text-main">{{ item.designation }}</td>
                                            <td class="text-center">
                                                <span class="qty-badge">{{ item.quantite }}</span>
                                            </td>
                                            <td class="text-end">
                                                <button type="button" (click)="retirerDuPanier(i)" class="btn-delete-pro border-0">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="section-divider"></div>

                        <div class="row g-4">
                            <div class="col-md-12">
                                <label class="form-label-pro">Niveau d'Urgence</label>
                                <div class="d-flex gap-3">
                                    <div class="flex-grow-1">
                                        <select class="form-select-pro" formControlName="urgence">
                                            <option value="Normale">Normale</option>
                                            <option value="Urgent">Urgent</option>
                                            <option value="Critique">Critique</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <label class="form-label-pro">Motif du remplacement / Notes supplémentaires</label>
                            <textarea class="form-input-pro" formControlName="motif" rows="3"
                                placeholder="Indiquez brièvement pourquoi ces pièces sont nécessaires..."></textarea>
                        </div>

                        <div class="mt-5">
                            <button type="submit" class="btn-primary-pro w-100" [disabled]="panier.length === 0 || loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                                <i class="bi bi-send-check me-2" *ngIf="!loading"></i>
                                {{ loading ? 'Envoi en cours...' : 'Soumettre la Demande Officielle' }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-4 text-center">
                <a routerLink="/technicien" class="btn btn-link text-muted text-decoration-none small fw-bold">
                    <i class="bi bi-arrow-left me-1"></i> Revenir au tableau de bord
                </a>
            </div>
        </div>
    </div>
</div>
